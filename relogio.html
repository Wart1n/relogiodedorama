<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Relógio Oficial - Love Next Door</title>
    <style>
        @import url('https://googleapis.com');
        
        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .container {
            background-color: #faf7f2;
            padding: 30px;
            border-radius: 8px;
            box-sizing: border-box;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            width: 650px;
            height: 680px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            margin: 0;
            font-weight: 700;
            color: #1a1a1a;
        }

        .header p {
            font-size: 11px;
            margin: 4px 0 15px 0;
            font-weight: 700;
            color: #666;
            letter-spacing: 1px;
        }

        svg {
            width: 500px;
            height: 500px;
        }

        /* Estilo limpo e fixo para os textos internos em coreano */
        .txt-atividade {
            font-size: 13px;
            fill: #222;
            font-weight: 700;
            text-anchor: middle;
            dominant-baseline: middle;
        }

        /* Estilo para os números das horas externos */
        .txt-hora {
            font-size: 11px;
            fill: #444;
            font-family: Arial, sans-serif;
            text-anchor: middle;
            dominant-baseline: middle;
        }

        .txt-hora-24 {
            font-weight: bold;
            font-size: 15px;
            fill: #000;
        }

        /* Botão PLAY interativo */
        .btn-play {
            fill: #ffd11a;
            stroke: #222;
            stroke-width: 1.5;
            cursor: pointer;
            transition: fill 0.2s;
        }

        .btn-play:hover {
            fill: #ffea6c;
        }

        .btn-play-text {
            font-size: 11px;
            fill: #222;
            font-weight: 700;
            text-anchor: middle;
            dominant-baseline: middle;
            cursor: pointer;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>배석류 백수계획표</h1>
        <p>TODAY'S TIME TABLE</p>
    </div>

    <svg viewBox="0 0 400 400">
        <!-- Círculo de fundo principal -->
        <circle cx="200" cy="200" r="161" fill="#ffffff" stroke="#222" stroke-width="1.5" />
        <circle cx="200" cy="200" r="157" fill="none" stroke="#222" stroke-width="0.5" />

        <!-- LINHAS DIVISÓRIAS (Fixas) -->
        <line x1="200" y1="200" x2="200" y2="39" stroke="#222" stroke-width="1.5" /> <!-- 24h / 0h -->
        <line x1="200" y1="200" x2="355" y2="158" stroke="#222" stroke-width="1.2" /> <!-- 5h -->
        <line x1="200" y1="200" x2="361" y2="200" stroke="#222" stroke-width="1.2" /> <!-- 6h -->
        <line x1="200" y1="200" x2="314" y2="314" stroke="#222" stroke-width="1.2" /> <!-- 9h -->
        <line x1="200" y1="200" x2="241" y2="355" stroke="#222" stroke-width="1.2" /> <!-- 11h30 -->
        <line x1="200" y1="200" x2="159" y2="355" stroke="#222" stroke-width="1.2" /> <!-- 12h30 -->
        <line x1="200" y1="200" x2="86" y2="314" stroke="#222" stroke-width="1.2" /> <!-- 14h30 -->
        <line x1="200" y1="200" x2="39" y2="200" stroke="#222" stroke-width="1.2" />  <!-- 17h30 -->
        <line x1="200" y1="200" x2="45" y2="158" stroke="#222" stroke-width="1.2" />  <!-- 19h30 -->
        <line x1="200" y1="200" x2="86" y2="86" stroke="#222" stroke-width="1.2" />   <!-- 21h30 -->

        <!-- TEXTOS DAS ATIVIDADES EM COREANO (Ajustados ao centro das fatias) -->
        <text x="260" y="105" class="txt-atividade">꿈나라</text>
        <text x="325" y="178" class="txt-atividade" font-size="12">아침</text>
        <text x="305" y="245" class="txt-atividade">게임하기</text>
        <text x="252" y="300" class="txt-atividade">멍때리기</text>
        <text x="200" y="330" class="txt-atividade" font-size="11">점심</text>
        <text x="150" y="300" class="txt-atividade">TV보기</text>
        <text x="95" y="245" class="txt-atividade">낮잠자기</text>
        <text x="85" y="190" class="txt-atividade">만화방 가기</text>
        <text x="110" y="145" class="txt-atividade">자유시간</text>
        <text x="155" y="95" class="txt-atividade">명상</text>

        <!-- NÚMEROS DO RELÓGIO EXTERNO (1 a 24 - Alinhamento Perfeito) -->
        <text x="246" y="26" class="txt-hora">1</text>
        <text x="289" y="44" class="txt-hora">2</text>
        <text x="326" y="74" class="txt-hora">3</text>
        <text x="356" y="111" class="txt-hora">4</text>
        <text x="374" y="154" class="txt-hora">5</text>
        <text x="379" y="200" class="txt-hora">6</text>
        <text x="374" y="246" class="txt-hora">7</text>
        <text x="356" y="289" class="txt-hora">8</text>
        <text x="326" y="326" class="txt-hora">9</text>
        <text x="289" y="356" class="txt-hora">10</text>
        <text x="246" y="374" class="txt-hora">11</text>
        <text x="200" y="380" class="txt-hora">12</text>
        <text x="154" y="374" class="txt-hora">13</text>
        <text x="111" y="356" class="txt-hora">14</text>
        <text x="74" y="326" class="txt-hora">15</text>
        <text x="44" y="289" class="txt-hora">16</text>
        <text x="26" y="246" class="txt-hora">17</text>
        <text x="21" y="200" class="txt-hora">18</text>
        <text x="26" y="154" class="txt-hora">19</text>
        <text x="44" y="111" class="txt-hora">20</text>
        <text x="74" y="74" class="txt-hora">21</text>
        <text x="111" y="44" class="txt-hora">22</text>
        <text x="154" y="26" class="txt-hora">23</text>
        <text x="200" y="20" class="txt-hora txt-hora-24">24</text>

        <!-- BOTÃO CENTRAL INTERATIVO -->
        <circle cx="200" cy="200" r="23" class="btn-play" id="botao-play" />
        <text x="200" y="200" class="btn-play-text" id="texto-play">PLAY</text>
    </svg>
</div>

<script>
    const botaoPlay = document.getElementById('botao-play');
    const textoPlay = document.getElementById('texto-play');
    let relogioAtivo = false;
    let intervalo;

    botaoPlay.addEventListener('click', () => {
        if (!relogioAtivo) {
            relogioAtivo = true;
            botaoPlay.style.fill = "#ffea6c";
            
            function atualizar() {
                const agora = new Date();
                const h = String(agora.getHours()).padStart(2, '0');
                const m = String(agora.getMinutes()).padStart(2, '0');
                textoPlay.textContent = `${h}:${m}`;
            }
            
            atualizar();
            intervalo = setInterval(atualizar, 1000);
        } else {
            relogioAtivo = false;
            clearInterval(intervalo);
            botaoPlay.style.fill = "#ffd11a";
            textoPlay.textContent = "PLAY";
        }
    });
</script>

</body>
</html>
